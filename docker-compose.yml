services:
  bot:
    build: .
    container_name: boli-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
